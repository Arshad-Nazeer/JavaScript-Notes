<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slider">
        <div class="slides">
            <img src="carblack.avif" alt="black car" class="slide">
            <img src="carred.avif" alt="red car" class="slide">
            <img src="carwhite.avif" alt="black car" class="slide">
        </div>
        <button id="prev" onclick="prevSlide()">&#10094</button>
        <button id="next" onclick="nextSlide()">&#10095</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
