<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>PASSWORD GENERATOR</h1>

    <input type="number" value="6" min="1" id="length">
    <br>

    <input type="checkbox" id="includeuppercase">
    <label>UpperCase Characters</label>
    <br>

    <input type="checkbox" id="includelowercase">
    <label>LowerCase Characters</label>
    <br>

    <input type="checkbox" id="includenumbers">
    <label>Number Characters</label>
    <br>

    <input type="checkbox" id="includesymbols">
    <label>Symbol Characters</label>
    <br>

    <button id="button">Generate</button>

    <p id="result"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
